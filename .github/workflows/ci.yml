name: Trust-Transpiler CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ----------------------------------------------------------------
  # Job 1: Compilar e executar a análise com os demos embutidos
  # ----------------------------------------------------------------
  build-and-run:
    name: Build & Run Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download Rascal shell JAR
        run: |
          curl -fsSL \
            "https://update.rascal-mpl.org/console/rascal-shell-stable.jar" \
            -o rascal-shell-stable.jar
          echo "Rascal shell downloaded: $(du -sh rascal-shell-stable.jar | cut -f1)"

      - name: Compile with Maven
        run: mvn compile --no-transfer-progress

      - name: Run pipeline (all demos)
        run: |
          java -Xmx512m -jar rascal-shell-stable.jar \
            --src src \
            --module pipeline::TrustTranspiler \
            --call main
        # A saída contém os relatórios de auditoria de cada demo.
        # O processo termina com código 0 mesmo quando há vulns —
        # a detecção é reportada no stdout para inspeção humana.

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: |
            target/
          retention-days: 7

  # ----------------------------------------------------------------
  # Job 2: Testes unitários Rascal (:test framework)
  # ----------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-and-run

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download Rascal shell JAR
        run: |
          curl -fsSL \
            "https://update.rascal-mpl.org/console/rascal-shell-stable.jar" \
            -o rascal-shell-stable.jar

      - name: Run unit tests
        run: |
          java -Xmx512m -jar rascal-shell-stable.jar \
            --src src \
            --module test::AllTests \
            --call runAll
        # Se o módulo de testes não existir ainda, este step é ignorado.
        continue-on-error: true

  # ----------------------------------------------------------------
  # Job 3: Lint — verificar que todos os .rsc compilam sem warnings
  # ----------------------------------------------------------------
  lint:
    name: Lint Rascal Sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Check encoding (UTF-8 only)
        run: |
          find src -name "*.rsc" | while read f; do
            if ! file "$f" | grep -qE "ASCII|UTF-8"; then
              echo "WARN: encoding inesperado em $f"
            fi
          done
          echo "Encoding check complete."

      - name: Compile all modules (strict)
        run: mvn compile --no-transfer-progress -Drascal.errorsAsWarnings=false
