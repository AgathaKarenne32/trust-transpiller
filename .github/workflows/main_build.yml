name: trust-transpiler CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  RASCAL_JAR: rascal-shell-stable.jar
  RASCAL_URL: https://update.rascal-mpl.org/console/rascal-shell-stable.jar
  MAIN_MODULE: pipeline::TrustTranspiler

jobs:
  # ----------------------------------------------------------------
  # Job 1 — Static audit
  # Sem Maven. O rascal-shell-stable.jar é self-contained.
  # ----------------------------------------------------------------
  audit:
    name: Static Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # JDK 17 — necessário para rodar o JAR do Rascal
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Cache do JAR para não re-baixar a cada run
      - name: Cache Rascal shell JAR
        id: cache-rascal
        uses: actions/cache@v4
        with:
          path: ${{ env.RASCAL_JAR }}
          key: rascal-shell-stable-jar-v1

      # Download direto via curl — sem Maven, sem nexus.usethesource.io
      - name: Download Rascal shell (stable)
        if: steps.cache-rascal.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Rascal shell via curl …"
          curl -fsSL "$RASCAL_URL" -o "$RASCAL_JAR"
          echo "Download OK — $(du -sh $RASCAL_JAR | cut -f1)"

      # Sanity-check: confirma que é um JAR válido
      - name: Validate Rascal JAR
        run: |
          [ -f "$RASCAL_JAR" ] || { echo "::error::JAR not found"; exit 1; }
          unzip -t "$RASCAL_JAR" > /dev/null 2>&1 \
            || { echo "::error::Not a valid JAR/ZIP"; exit 1; }
          echo "JAR OK — $(jar tf $RASCAL_JAR | wc -l) entries"

      # Verifica estrutura do projeto
      - name: Verify project structure
        run: |
          echo "── .rsc source files ──────────────────────"
          find src -name "*.rsc" | sort
          echo ""
          echo "── META-INF/RASCAL.MF ─────────────────────"
          if [ -f META-INF/RASCAL.MF ]; then
            cat META-INF/RASCAL.MF
          else
            echo "::error::META-INF/RASCAL.MF AUSENTE"
            exit 1
          fi
          echo "───────────────────────────────────────────"

      # -------------------------------------------------------
      # Execução principal — APENAS rascal-shell-stable.jar + src
      #
      # O rascal-shell-stable.jar é um "fat JAR" (uber-jar):
      #   - contém o interpretador Rascal completo
      #   - contém toda a stdlib (List, Set, Map, IO, …)
      #   - NÃO precisa de dependências Maven adicionais
      #
      # Classpath:
      #   (1) rascal-shell-stable.jar  — o interpretador
      #   (2) src                      — os .rsc do projeto
      #   (3) .                        — raiz do projeto
      #       (para o Rascal localizar META-INF/RASCAL.MF)
      # -------------------------------------------------------
      - name: Run trust-transpiler static audit
        run: |
          touch audit_output.txt

          FULL_CP="${RASCAL_JAR}:src:."

          echo "=== Classpath ==="
          echo "$FULL_CP" | tr ':' '\n'
          echo "================="

          java \
            -Xmx2G \
            -Xss32m \
            -cp "$FULL_CP" \
            org.rascalmpl.shell.RascalShell \
            "$MAIN_MODULE" \
            2>&1 | tee audit_output.txt || true

          echo "--- Últimas 20 linhas do output ---"
          tail -20 audit_output.txt

      # Upload sempre (mesmo em falha) — `touch` garante que o arquivo existe
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-transpiler-audit-report
          path: audit_output.txt
          retention-days: 30

      # Resumo no GitHub Step Summary
      - name: Parse vulnerability summary
        if: always()
        run: |
          echo "## trust-transpiler Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "BUILD PASSED" audit_output.txt; then
            echo "✅ **Nenhuma vulnerabilidade detectada.**" >> $GITHUB_STEP_SUMMARY
          elif grep -q "TRUST-TRANSPILER AUDIT REPORT" audit_output.txt; then
            echo "❌ **Vulnerabilidades detectadas.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "(CRITICAL|HIGH|MEDIUM|LOW|Sink|Source|Via|Detail)" \
              audit_output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Rascal shell não produziu relatório. Verifique os logs.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 audit_output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      # Falha explícita APÓS salvar os artefatos
      - name: Assert audit completed
        run: |
          if ! grep -q "TRUST-TRANSPILER AUDIT REPORT" audit_output.txt; then
            echo "::error::Rascal não produziu relatório de auditoria."
            echo "::error::Últimas linhas do output:"
            tail -20 audit_output.txt >&2
            exit 1
          fi

  # ----------------------------------------------------------------
  # Job 2 — Lint: valida declarações de módulo vs. paths de arquivo
  # ----------------------------------------------------------------
  lint:
    name: Rascal Source Lint
    runs-on: ubuntu-latest
    needs: audit
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify META-INF/RASCAL.MF exists
        run: |
          [ -f META-INF/RASCAL.MF ] \
            || { echo "::error::META-INF/RASCAL.MF missing!"; exit 1; }
          echo "META-INF/RASCAL.MF ✓"
          cat META-INF/RASCAL.MF

      # Compara "module foo::bar::Baz" com o path src/foo/bar/Baz.rsc
      # IMPORTANTE: usa sed 's|/|::|g' — separador DUPLO ::
      - name: Check module declarations match file paths
        run: |
          ERRORS=0
          while IFS= read -r -d '' rsc_file; do
            rel="${rsc_file#src/}"
            expected_mod=$(echo "${rel%.rsc}" | sed 's|/|::|g')

            declared=$(grep -m1 "^module " "$rsc_file" \
                       | sed 's/^module //' | tr -d ' \r')

            if [ -z "$declared" ]; then
              echo "::warning file=$rsc_file::Sem declaração de módulo"
            elif [ "$declared" != "$expected_mod" ]; then
              echo "::error file=$rsc_file,title=Module mismatch::got='$declared' want='$expected_mod'"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓  $declared"
            fi
          done < <(find src -name "*.rsc" -print0)

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "::error::$ERRORS arquivo(s) com declaração de módulo incorreta."
            exit 1
          fi
          echo "Lint OK ✓"

  # ----------------------------------------------------------------
  # Job 3 — Security gate: bloqueia CRITICAL e HIGH
  # ----------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: audit
    if: always()

    steps:
      - name: Download audit report
        id: dl
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: trust-transpiler-audit-report

      - name: Enforce zero CRITICAL / HIGH findings
        run: |
          if [ ! -f audit_output.txt ]; then
            echo "::error::Relatório de auditoria ausente — job de auditoria crashou."
            exit 1
          fi

          CRITICAL=$(grep -c "CRITICAL" audit_output.txt || true)
          HIGH=$(grep -c "HIGH    " audit_output.txt || true)

          echo "Critical : $CRITICAL"
          echo "High     : $HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Security gate FALHOU — $CRITICAL CRITICAL, $HIGH HIGH"
            exit 1
          fi
          echo "Security gate PASSOU ✓"
