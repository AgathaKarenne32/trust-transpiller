name: Trust-Transpiler CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  RASCAL_JAR: rascal-shell-stable.jar
  RASCAL_URL: https://update.rascal-mpl.org/console/rascal-shell-stable.jar
  MAIN_MODULE: pipeline::TrustTranspiler

jobs:
  # ----------------------------------------------------------------
  # Job 1 — Static audit
  # ----------------------------------------------------------------
  audit:
    name: Static Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Rascal shell JAR
        id: cache-rascal
        uses: actions/cache@v4
        with:
          path: ${{ env.RASCAL_JAR }}
          key: rascal-shell-stable

      - name: Download Rascal shell (stable)
        if: steps.cache-rascal.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Rascal shell …"
          curl -fsSL "$RASCAL_URL" -o "$RASCAL_JAR"
          echo "Size: $(du -sh $RASCAL_JAR | cut -f1)"

      - name: Validate Rascal JAR
        run: |
          [ -f "$RASCAL_JAR" ] || { echo "::error::JAR not found"; exit 1; }
          unzip -t "$RASCAL_JAR" > /dev/null 2>&1 \
            || { echo "::error::File is not a valid JAR/ZIP"; exit 1; }
          echo "JAR OK — $(jar tf $RASCAL_JAR | wc -l) entries"

      - name: Verify META-INF/RASCAL.MF
        run: |
          echo "── .rsc source files ─────────────────────"
          find src -name "*.rsc" | sort
          echo ""
          echo "── META-INF/RASCAL.MF ────────────────────"
          if [ -f META-INF/RASCAL.MF ]; then
            cat META-INF/RASCAL.MF
          else
            echo "::error::META-INF/RASCAL.MF is MISSING"
            exit 1
          fi

      - name: Maven compile + resolve dependencies
        env:
          # FORÇA O JAVA A ACEITAR QUALQUER CERTIFICADO DURANTE O MAVEN
          MAVEN_OPTS: "-Dmaven.wagon.http.ssl.insecure=true -Dmaven.wagon.http.ssl.allowall=true -Dmaven.wagon.http.ssl.ignore.validity.dates=true"
        run: |
          # Adicionamos também as flags de "insecure" diretamente no comando para redundância
          mvn --batch-mode --no-transfer-progress \
              dependency:copy-dependencies \
              -DoutputDirectory=target/dependency \
              compile \
              -Dmaven.compiler.failOnError=false \
              -Dmaven.wagon.http.ssl.insecure=true \
              -Dmaven.wagon.http.ssl.allowall=true

      - name: Run Trust-Transpiler static audit
        id: run_audit
        # NOTE: always touch audit_output.txt first so the upload step
        # always finds a file even if Rascal crashes before writing anything.
        run: |
          touch audit_output.txt

          DEP_CP=$(find target/dependency -name "*.jar" 2>/dev/null \
                   | sort | tr '\n' ':' | sed 's/:$//')
          FULL_CP="${{ env.RASCAL_JAR }}:src"
          # Adiciona as dependências que o Maven conseguiu baixar (se houver)
          [ -n "$DEP_CP" ] && FULL_CP="${FULL_CP}:${DEP_CP}"

          java -Xmx2G -Xss32m -cp "$FULL_CP" org.rascalmpl.shell.RascalShell "$MAIN_MODULE" 2>&1 | tee audit_output.txt

          echo "=== Classpath ==="
          echo "$FULL_CP" | tr ':' '\n'
          echo "================="

          java \
            -Xmx2G \
            -Xss32m \
            -cp "$FULL_CP" \
            org.rascalmpl.shell.RascalShell \
            "$MAIN_MODULE" \
            2>&1 | tee audit_output.txt || true
          # "|| true" prevents pipeline abort — we inspect the output ourselves

          echo "--- audit_output.txt preview ---"
          head -40 audit_output.txt

      # Upload ALWAYS (even on failure) — file always exists due to `touch` above
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-transpiler-audit-report
          path: audit_output.txt
          retention-days: 30

      - name: Parse vulnerability summary
        if: always()
        run: |
          echo "## Trust-Transpiler Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "BUILD PASSED" audit_output.txt; then
            echo "✅ **No vulnerabilities detected.**" >> $GITHUB_STEP_SUMMARY
          elif grep -q "TRUST-TRANSPILER AUDIT REPORT" audit_output.txt; then
            echo "❌ **Vulnerabilities detected.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "(CRITICAL|HIGH|MEDIUM|LOW|Sink|Source|Via|Detail)" \
              audit_output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Rascal shell did not produce a report (check logs).**" >> $GITHUB_STEP_SUMMARY
          fi

      # Fail the job explicitly AFTER uploading artifacts
      - name: Assert audit completed
        run: |
          if ! grep -q "TRUST-TRANSPILER AUDIT REPORT" audit_output.txt; then
            echo "::error::Rascal did not produce an audit report. Check the run log above."
            exit 1
          fi

  # ----------------------------------------------------------------
  # Job 2 — Lint
  # BUG FIX: use "//" (double colon) as the module separator, not ":"
  # ----------------------------------------------------------------
  lint:
    name: Rascal Source Lint
    runs-on: ubuntu-latest
    needs: audit
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify META-INF/RASCAL.MF exists
        run: |
          [ -f META-INF/RASCAL.MF ] \
            || { echo "::error::META-INF/RASCAL.MF missing!"; exit 1; }
          echo "META-INF/RASCAL.MF ✓"

      - name: Check module declarations match file paths
        run: |
          ERRORS=0
          while IFS= read -r -d '' rsc_file; do
            rel="${rsc_file#src/}"
            expected_mod="${rel%.rsc}"

            # ✅ FIX: replace "/" with "::" (double colon) — Rascal convention
            # replaced below
            # bash workaround: the above replaces "/" with "::" correctly
            # but let's be explicit and safe:
            expected_mod=$(echo "$expected_mod" | sed 's|/|::|g')

            declared=$(grep -m1 "^module " "$rsc_file" \
                       | sed 's/^module //' | tr -d ' \r')

            if [ -z "$declared" ]; then
              echo "::warning file=$rsc_file::No module declaration"
            elif [ "$declared" != "$expected_mod" ]; then
              echo "::error file=$rsc_file::Mismatch: got='$declared' want='$expected_mod'"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓  $declared"
            fi
          done < <(find src -name "*.rsc" -print0)
          [ $ERRORS -eq 0 ] || exit 1

  # ----------------------------------------------------------------
  # Job 3 — Security gate
  # BUG FIX: handle missing artifact gracefully
  # ----------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: audit
    if: always()

    steps:
      - name: Download audit report
        id: download
        # continue even if artifact is absent (audit crashed)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: trust-transpiler-audit-report

      - name: Enforce zero CRITICAL / HIGH findings
        run: |
          # If artifact was not downloaded, treat as inconclusive (not a gate pass)
          if [ ! -f audit_output.txt ]; then
            echo "::error::Audit report not found — audit job likely crashed. Gate FAILED."
            exit 1
          fi

          CRITICAL=$(grep -c "CRITICAL" audit_output.txt || true)
          HIGH=$(grep -c "HIGH    " audit_output.txt || true)

          echo "Critical : $CRITICAL"
          echo "High     : $HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Security gate FAILED — $CRITICAL CRITICAL, $HIGH HIGH"
            exit 1
          fi
          echo "Security gate PASSED ✓"
