name: Trust-Transpiller CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ------------------------------------------------------------------
  # Job 1: Compilar via Maven + executar pipeline de demos
  # ------------------------------------------------------------------
  build-and-run:
    name: Build & Run Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Baixar o shell JAR — usado apenas para executar main()
      # A versão do JAR deve bater com rascal.version do pom.xml
      - name: Download Rascal shell JAR
        run: |
          curl -fsSL \
            "https://releases.usethesource.io/maven/org/rascalmpl/rascal/0.42.1/rascal-0.42.1.jar" \
            -o rascal-shell-stable.jar
          echo "JAR: $(du -sh rascal-shell-stable.jar | cut -f1)"

      # Compilar todos os módulos .rsc via plugin Maven
      - name: Compile Rascal modules
        run: mvn compile --no-transfer-progress

      # Executar o main() do pipeline
      # IMPORTANTE: não passar --src; o shell lê o RASCAL.MF automaticamente
      - name: Run pipeline (all demos)
        run: |
          java -Xmx512m -jar rascal-shell-stable.jar \
            --module pipeline::TrustTranspiler \
            --call main

      - name: Upload target as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: target/
          retention-days: 7

  # ------------------------------------------------------------------
  # Job 2: Testes unitários
  # ------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-and-run

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Download Rascal shell JAR
        run: |
          curl -fsSL \
            "https://releases.usethesource.io/maven/org/rascalmpl/rascal/0.42.1/rascal-0.42.1.jar" \
            -o rascal-shell-stable.jar

      - name: Compile
        run: mvn compile --no-transfer-progress

      - name: Run unit tests
        run: |
          java -Xmx512m -jar rascal-shell-stable.jar \
            --module test::AllTests \
            --call runAll

  # ------------------------------------------------------------------
  # Job 3: Lint — encoding UTF-8
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check UTF-8 encoding
        run: |
          FAIL=0
          for f in $(find src -name "*.rsc"); do
            if file "$f" | grep -qvE "ASCII|UTF-8"; then
              echo "BAD ENCODING: $f"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then exit 1; fi
          echo "All .rsc files are ASCII/UTF-8."

      - name: Validate RASCAL.MF
        run: |
          REPO=$(basename "$GITHUB_REPOSITORY")
          NAME=$(grep "^Project-Name:" META-INF/RASCAL.MF | awk '{print $2}' | tr -d '\r')
          echo "Repo: $REPO | RASCAL.MF Project-Name: $NAME"
          if [ "$NAME" != "$REPO" ]; then
            echo "ERROR: Project-Name ($NAME) != repo folder ($REPO)"
            exit 1
          fi
          echo "Project-Name matches repo name."
