name: Trust-Transpiler CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  RASCAL_JAR: rascal-shell-stable.jar
  RASCAL_URL: https://update.rascal-mpl.org/console/rascal-shell-stable.jar
  MAIN_MODULE: pipeline::TrustTranspiler

jobs:
  # ----------------------------------------------------------------
  # Job 1 — Static audit (core pipeline)
  # ----------------------------------------------------------------
  audit:
    name: Static Security Audit
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (required by Rascal 0.28.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3. Cache the Rascal jar so we don't re-download on every run
      - name: Cache Rascal shell JAR
        id: cache-rascal
        uses: actions/cache@v4
        with:
          path: ${{ env.RASCAL_JAR }}
          key: rascal-shell-stable-${{ hashFiles('RASCAL.MF') }}

      # 4. Download Rascal if not cached
      - name: Download Rascal shell (stable)
        if: steps.cache-rascal.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Rascal shell from $RASCAL_URL …"
          curl -fsSL "$RASCAL_URL" -o "$RASCAL_JAR"
          echo "Download complete. Size: $(du -sh $RASCAL_JAR | cut -f1)"

      # 5. Validate the JAR exists and is a valid zip/jar
      - name: Validate Rascal JAR
        run: |
          if [ ! -f "$RASCAL_JAR" ]; then
            echo "::error::Rascal JAR not found at $RASCAL_JAR"
            exit 1
          fi
          jar tf "$RASCAL_JAR" > /dev/null 2>&1 || {
            echo "::error::Downloaded file is not a valid JAR"
            exit 1
          }
          echo "JAR is valid."

      # 6. Verify source structure
      - name: Verify project structure
        run: |
          echo "── Project layout ──────────────────────"
          find src -name "*.rsc" | sort
          echo "────────────────────────────────────────"
          [ -f RASCAL.MF ] && cat RASCAL.MF || echo "::warning::RASCAL.MF not found"

      # 7. Run Trust-Transpiler
      - name: Run Trust-Transpiler static audit
        id: run_audit
        run: |
          java \
            -Xmx2G \
            -Xss32m \
            -cp "$RASCAL_JAR:src" \
            org.rascalmpl.shell.RascalShell \
            "$MAIN_MODULE" \
            2>&1 | tee audit_output.txt

          # Propagate non-zero exit codes
          exit ${PIPESTATUS[0]}

      # 8. Upload audit output as an artefact (always, even on failure)
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-transpiler-audit-report
          path: audit_output.txt
          retention-days: 30

      # 9. Parse output for vulnerability summary
      - name: Parse vulnerability summary
        if: always()
        run: |
          echo "## Trust-Transpiler Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if grep -q "BUILD PASSED" audit_output.txt; then
            echo "✅ **No vulnerabilities detected.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Vulnerabilities detected — build failed.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "(CRITICAL|HIGH|MEDIUM|LOW|Sink|Source|Via)" audit_output.txt \
              >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ----------------------------------------------------------------
  # Job 2 — Lint / style check for .rsc files
  # ----------------------------------------------------------------
  lint:
    name: Rascal Source Lint
    runs-on: ubuntu-latest
    needs: audit
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check module declarations match file paths
        run: |
          ERRORS=0
          while IFS= read -r -d '' rsc_file; do
            # Derive expected module name from path  src/foo/bar/Baz.rsc → foo::bar::Baz
            rel="${rsc_file#src/}"
            expected_mod="${rel%.rsc}"
            expected_mod="${expected_mod//\//:}"

            # Extract declared module name from first non-empty, non-comment line
            declared=$(grep -m1 "^module " "$rsc_file" | sed 's/^module //' | tr -d ' \r')

            if [ -z "$declared" ]; then
              echo "::warning file=$rsc_file::No module declaration found"
            elif [ "$declared" != "$expected_mod" ]; then
              echo "::error file=$rsc_file::Module mismatch: declared='$declared' expected='$expected_mod'"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓  $rsc_file  →  $declared"
            fi
          done < <(find src -name "*.rsc" -print0)

          [ $ERRORS -eq 0 ] || exit 1

      - name: Check for tabs vs spaces consistency
        run: |
          echo "Checking indentation consistency …"
          ISSUES=$(grep -rPn "\t" src/ --include="*.rsc" | wc -l)
          if [ "$ISSUES" -gt 0 ]; then
            echo "::warning::$ISSUES lines use tab indentation (prefer spaces in .rsc files)"
            grep -rPn "\t" src/ --include="*.rsc" | head -20
          else
            echo "Indentation is consistent (spaces only)."
          fi

  # ----------------------------------------------------------------
  # Job 3 — Security gate (fail the pipeline if criticals found)
  # ----------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: audit
    if: always()

    steps:
      - name: Download audit report artefact
        uses: actions/download-artifact@v4
        with:
          name: trust-transpiler-audit-report

      - name: Enforce zero CRITICAL / HIGH vulnerabilities
        run: |
          CRITICAL=$(grep -c "CRITICAL" audit_output.txt || true)
          HIGH=$(grep -c "HIGH" audit_output.txt || true)

          echo "Critical findings : $CRITICAL"
          echo "High findings     : $HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Security gate failed: $CRITICAL CRITICAL and $HIGH HIGH vulnerabilities found."
            exit 1
          else
            echo "Security gate passed."
          fi
